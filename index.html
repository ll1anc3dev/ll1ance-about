<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ll1ance — Konsole</title>

  <style>
    @import url("https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap");

    :root {
      --bg: #05070c;
      --panel: rgba(8, 13, 24, 0.92);
      --panel-2: rgba(4, 8, 16, 0.92);
      --border: rgba(86, 108, 140, 0.26);
      --soft: rgba(255, 255, 255, 0.06);
      --text: #dbe4f3;
      --muted: #8f9ab0;
      --cyan: #28e5ff;
      --green: #19f2b3;
      --shadow: 0 18px 60px rgba(0, 0, 0, 0.42);
      --radius: 18px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Geist Mono", "JetBrains Mono", monospace;
      color: var(--text);
      background:
        radial-gradient(circle at 0% 0%, rgba(0, 194, 255, 0.13), transparent 26%),
        radial-gradient(circle at 100% 0%, rgba(96, 130, 255, 0.12), transparent 30%),
        linear-gradient(180deg, #071019 0%, #04070d 100%);
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.032) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.032) 1px, transparent 1px);
      background-size: 44px 44px;
      opacity: 0.16;
      pointer-events: none;
    }

    .wrap {
      width: min(1280px, calc(100% - 28px));
      margin: 6px auto 16px;
      position: relative;
      z-index: 1;
    }

    .window {
      background: linear-gradient(180deg, rgba(14, 19, 31, 0.95), rgba(7, 10, 18, 0.95));
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(16px);
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        border-color 0.2s ease,
        background 0.2s ease;
    }

    .window:hover {
      transform: translateY(-2px);
      box-shadow: 0 24px 72px rgba(0, 0, 0, 0.5);
      border-color: rgba(86, 108, 140, 0.38);
    }

    .titlebar {
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px 0 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0));
    }

    .title-left {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #d7dfef;
      font-size: 14px;
    }

    .title-left .prompt-icon {
      color: var(--cyan);
      font-weight: 700;
    }

    .title-buttons {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #8c96ac;
      font-size: 18px;
      user-select: none;
    }

    .content {
      padding: 14px 16px 14px;
    }

    .prompt {
      font-size: 15px;
      margin-bottom: 14px;
      white-space: nowrap;
    }

    .username {
      color: var(--green);
      font-weight: 700;
    }

    .host {
      color: var(--cyan);
      font-weight: 700;
    }

    .path {
      color: #aeb6c9;
    }

    .cmd {
      color: #f3f6fb;
    }

    .top-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(0, 1.45fr);
      gap: 16px;
      margin-bottom: 16px;
      align-items: stretch;
    }

    .panel {
      background: linear-gradient(180deg, rgba(3, 7, 14, 0.94), rgba(3, 7, 14, 0.84));
      border: 1px solid var(--soft);
      border-radius: var(--radius);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.03);
      min-width: 0;
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        border-color 0.2s ease,
        background 0.2s ease;
    }

    .panel:hover {
      transform: translateY(-2px);
      border-color: rgba(46, 230, 255, 0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 18px 42px rgba(0, 0, 0, 0.24);
    }

    .music-panel {
      min-height: 356px;
      padding: 14px;
      display: flex;
    }

    .music-card {
      width: 100%;
      min-height: 100%;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.10), transparent 24%),
        radial-gradient(circle at 100% 100%, rgba(170, 180, 190, 0.09), transparent 32%),
        linear-gradient(135deg, #1f969f 0%, #167985 34%, #0f5b67 67%, #0a3f47 100%);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.32);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      transition: box-shadow 0.2s ease;
    }

    .music-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.045), rgba(255,255,255,0)),
        radial-gradient(circle at 0% 0%, rgba(255,255,255,0.07), transparent 20%);
      pointer-events: none;
    }

    .music-card:hover {
      box-shadow: 0 28px 56px rgba(0, 0, 0, 0.38);
    }

    .music-main {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 182px minmax(0, 1fr);
      gap: 20px;
      flex: 1;
      min-height: 0;
    }

    .music-left,
    .music-right {
      position: relative;
      z-index: 1;
      min-width: 0;
    }

    .music-left {
      --cover-size: 182px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      justify-content: space-between;
      width: var(--cover-size);
    }

    .music-now {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.92);
      font-size: 13px;
    }

    .music-now-dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #dce7ec;
      box-shadow: 0 0 10px rgba(220, 231, 236, 0.45);
      flex: 0 0 auto;
    }

    .music-cover {
      width: var(--cover-size);
      height: var(--cover-size);
      border-radius: 16px;
      object-fit: cover;
      display: block;
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 16px 30px rgba(0, 0, 0, 0.24);
      background: rgba(255,255,255,0.08);
    }

    .music-link {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      gap: 8px;
      font-size: 13px;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      padding: 11px 14px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      transition: all 0.2s ease;
    }

    .music-link:hover {
      border-color: rgba(255,255,255,0.24);
      background: rgba(255,255,255,0.09);
      transform: translateY(-1px);
    }

    .music-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding-right: 4px;
      min-width: 0;
    }

    .music-type {
      width: 100%;
      display: block;
      margin-bottom: 14px;
      padding-bottom: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.78);
      font-size: 14px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .music-title {
      font-family: "Inter", system-ui, sans-serif;
      font-size: clamp(30px, 3.2vw, 48px);
      line-height: 0.94;
      font-weight: 900;
      letter-spacing: -0.05em;
      color: #ffffff;
      margin: 0 0 14px;
      word-break: normal;
      overflow-wrap: normal;
      max-width: 100%;
    }

    .music-info {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      color: rgba(255,255,255,0.9);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .music-avatar {
      width: 24px;
      height: 24px;
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.12);
      flex: 0 0 auto;
      background: rgba(255,255,255,0.08);
    }

    .music-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .music-subinfo {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      color: rgba(255,255,255,0.84);
      font-family: "Inter", system-ui, sans-serif;
      font-size: 14px;
      margin-bottom: 0;
    }

    .info-panel {
      min-height: 356px;
      padding: 16px 18px 18px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .info-panel h1 {
      margin: 0 0 6px;
      color: var(--cyan);
      font-size: 22px;
      line-height: 1.1;
    }

    .info-panel .dash {
      color: #87a4d1;
      margin-bottom: 16px;
      letter-spacing: 1px;
    }

    .syslist {
      display: grid;
      gap: 10px;
      font-size: 16px;
      line-height: 1.15;
      margin-bottom: 18px;
    }

    .sysrow {
      display: flex;
      align-items: baseline;
      gap: 12px;
      flex-wrap: wrap;
    }

    .syskey {
      min-width: 96px;
      color: var(--cyan);
      font-weight: 700;
    }

    .sysval {
      color: #e4ebf8;
    }

    .palette {
      display: flex;
      gap: 4px;
      margin-top: 2px;
    }

    .palette span {
      width: 30px;
      height: 18px;
      display: inline-block;
    }

    .cmd-row {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .files {
      margin-left: auto;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .file {
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.03);
      color: #d9e2f2;
      border-radius: 16px;
      padding: 12px 16px;
      font-size: 14px;
      font-family: inherit;
      cursor: pointer;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease, box-shadow 0.18s ease;
    }

    .file:hover {
      transform: translateY(-1px);
      border-color: rgba(46, 230, 255, 0.35);
      background: rgba(46, 230, 255, 0.06);
    }

    .file.active {
      border-color: rgba(46, 230, 255, 0.72);
      background: rgba(46, 230, 255, 0.1);
      box-shadow: 0 0 0 1px rgba(46, 230, 255, 0.08), 0 0 28px rgba(46, 230, 255, 0.08);
    }

    .viewer {
      min-height: 242px;
      padding: 14px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(2,6,12,0.94), rgba(3,8,16,0.88));
      border: 1px solid rgba(255,255,255,0.07);
      transition:
        transform 0.2s ease,
        box-shadow 0.2s ease,
        border-color 0.2s ease,
        background 0.2s ease;
    }

    .viewer:hover {
      transform: translateY(-2px);
      border-color: rgba(46, 230, 255, 0.18);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.04),
        0 18px 42px rgba(0, 0, 0, 0.24);
    }

    .file-content {
      height: 100%;
    }

    .file-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2px 2px 12px;
      color: var(--cyan);
      font-weight: 700;
      font-size: 15px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      margin-bottom: 14px;
    }

    .close {
      appearance: none;
      border: 0;
      background: transparent;
      color: #a8b2c6;
      font-size: 18px;
      cursor: pointer;
      padding: 2px 6px;
    }

    .close:hover {
      color: #ffffff;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      color: #e3eaf7;
      font-size: 16px;
      line-height: 1.7;
    }

    .text-link {
      color: var(--cyan);
      text-decoration: none;
      border-bottom: 1px solid rgba(46, 230, 255, 0.35);
    }

    .text-link:hover {
      color: #ffffff;
      border-bottom-color: rgba(255, 255, 255, 0.7);
    }

    .empty {
      color: var(--muted);
      font-size: 15px;
      padding: 6px 2px;
    }

    .footer {
      margin-top: 12px;
      color: #7f8aa1;
      font-size: 14px;
      opacity: 0.9;
    }

    @media (max-width: 1060px) {
      .top-grid {
        grid-template-columns: 1fr;
      }

      .music-panel,
      .info-panel {
        min-height: auto;
      }
    }

    @media (max-width: 760px) {
      .wrap {
        width: min(100% - 14px, 1280px);
        margin: 6px auto 14px;
      }

      .content {
        padding: 12px;
      }

      .music-main {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .music-left {
        --cover-size: 190px;
        gap: 12px;
      }

      .music-title {
        font-size: 42px;
      }

      .files {
        margin-left: 0;
      }

      .prompt {
        overflow-x: auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="window">
      <div class="titlebar">
        <div class="title-left">
          <span class="prompt-icon">>_</span>
          <span>ll1ance — Konsole</span>
        </div>
        <div class="title-buttons">
          <span>-</span>
          <span>□</span>
          <span>×</span>
        </div>
      </div>

      <div class="content">
        <div class="prompt">
          <span class="username">ll1ance</span><span class="host">@fedora</span><span class="path">:~$</span>
          <span class="cmd"> fastfetch</span>
        </div>

        <div class="top-grid">
          <div class="panel music-panel">
            <div class="music-card" id="musicCard"></div>
          </div>

          <div class="panel info-panel">
            <h1>ll1ance@fedora</h1>
            <div class="dash">--------------</div>

            <div class="syslist">
              <div class="sysrow"><span class="syskey">OS:</span><span class="sysval">Fedora Linux 43</span></div>
              <div class="sysrow"><span class="syskey">DE:</span><span class="sysval">KDE Plasma</span></div>
              <div class="sysrow"><span class="syskey">WM:</span><span class="sysval">KWin (X11)</span></div>
              <div class="sysrow"><span class="syskey">Shell:</span><span class="sysval">bash</span></div>
              <div class="sysrow"><span class="syskey">Terminal:</span><span class="sysval">konsole</span></div>
              <div class="sysrow"><span class="syskey">Status:</span><span class="sysval">online</span></div>
              <div class="sysrow"><span class="syskey">Bio:</span><span class="sysval">not installed</span></div>
              <div class="sysrow"><span class="syskey">Updated:</span><span class="sysval" id="date">01.05.2026</span></div>
            </div>

            <div class="palette">
              <span style="background:#42536d"></span>
              <span style="background:#f76f8a"></span>
              <span style="background:#34e3a2"></span>
              <span style="background:#f4d03f"></span>
              <span style="background:#2ec8ff"></span>
              <span style="background:#b47ae8"></span>
              <span style="background:#58d7e8"></span>
              <span style="background:#d8dce5"></span>
            </div>
          </div>
        </div>

        <div class="cmd-row">
          <div class="prompt" style="margin:0;">
            <span class="username">ll1ance</span><span class="host">@fedora</span><span class="path">:~$</span>
            <span class="cmd"> ls /home/ll1ance</span>
          </div>

          <div class="files">
            <button class="file active" data-file="about.txt">▶ about.txt</button>
            <button class="file" data-file="setup.conf">▶ setup.conf</button>
            <button class="file" data-file="links.md">▶ links.md</button>
          </div>
        </div>

        <div class="viewer panel" id="fileView"></div>

        <div class="footer">personal page / still configuring</div>
      </div>
    </div>
  </div>

  <script>
    const track = {
      type: "Сингл",
      state: "now playing",
      title: "Не забывай",
      artist: "sqaute",
      year: "2025",
      duration: "2 мин. 14 сек.",
      cover: "./cover.jpg",
      url: "https://open.spotify.com/track/6v7JimVeQF6TtP5DNjqwel?si=643d29ca7c3d48ff"
    };

    const files = {
      "about.txt": `ll1ance

bio: not configured
langs: python / javascript
status: online sometimes
notes: dddd`,

      "setup.conf": `os=Fedora Linux 43
de=KDE Plasma
wm=KWin (X11)
shell=bash
terminal=konsole
font=Geist Mono / Inter`,

      "links.md": `# links

telegram: https://t.me/ll1ance
github: https://github.com/ll1anc3dev
spotify playlist: https://open.spotify.com/playlist/4cO8zOBABVHrRmg23xPX68?si=4624df94d2f64d7f`
    };

    const musicCard = document.getElementById("musicCard");
    const buttons = document.querySelectorAll(".file");
    const fileView = document.getElementById("fileView");
    const dateEl = document.getElementById("date");

    function escapeHtml(text) {
      return String(text)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderTextWithLinks(text) {
      const escaped = escapeHtml(text);

      return escaped.replace(
        /(https?:\/\/[^\s]+)/g,
        '<a class="text-link" href="$1" target="_blank" rel="noopener noreferrer">$1</a>'
      );
    }

    function renderTrack() {
      musicCard.innerHTML = `
        <div class="music-main">
          <div class="music-left">
            <div class="music-now">
              <span class="music-now-dot"></span>
              <span>${escapeHtml(track.state)}</span>
            </div>

            <img class="music-cover" src="${track.cover}" alt="${escapeHtml(track.title)} cover">
          </div>

          <div class="music-right">
            <div class="music-type">${escapeHtml(track.type)}</div>

            <h2 class="music-title">${escapeHtml(track.title)}</h2>

            <div class="music-info">
              <span class="music-avatar">
                <img src="${track.cover}" alt="">
              </span>
              <strong>${escapeHtml(track.artist)}</strong>
              <span>• ${escapeHtml(track.year)}</span>
            </div>

            <div class="music-subinfo">
              <span>• ${escapeHtml(track.duration)}</span>
            </div>
          </div>
        </div>

        <a class="music-link" href="${escapeHtml(track.url)}" target="_blank" rel="noopener noreferrer">
          open in spotify
        </a>
      `;
    }

    function openFile(name) {
      const text = files[name] || "file is empty";

      fileView.innerHTML = `
        <div class="file-content">
          <div class="file-head">
            <span>${escapeHtml(name)}</span>
            <button class="close" id="closeBtn" aria-label="Закрыть файл">×</button>
          </div>
          <pre>${renderTextWithLinks(text)}</pre>
        </div>
      `;

      const closeBtn = document.getElementById("closeBtn");
      closeBtn.addEventListener("click", closeFile);

      buttons.forEach(btn => {
        btn.classList.toggle("active", btn.dataset.file === name);
      });
    }

    function closeFile() {
      fileView.innerHTML = `<div class="empty">select a file</div>`;
      buttons.forEach(btn => btn.classList.remove("active"));
    }

    buttons.forEach(btn => {
      btn.addEventListener("click", () => openFile(btn.dataset.file));
    });

    if (dateEl) {
      dateEl.textContent = new Date().toLocaleDateString("ru-RU");
    }

    renderTrack();
    openFile("about.txt");
  </script>
</body>
</html>
